# Production topology for a SELF-HOSTED server.
#
#   caddy (:80/:443, automatic HTTPS)  →  gateway (internal)  →  services
#
# Nothing except Caddy publishes a host port — Postgres/Redis/MinIO/backends are
# reachable only on the internal opd-net. node-backend runs with NODE_ENV=production
# (which makes middleware/auth.js refuse to boot without a strong JWT_SECRET).
#
# Run:  DOMAIN=opd.hospital.in docker compose -f docker-compose.prod.yml up -d --build
# Prereqs: a filled, secured .env (see `node scripts/gen-secrets.js`) and DNS for $DOMAIN
# pointing at this server. This is a standalone file (not an override) so published
# ports are exact — keep it in sync with docker-compose.yml when services change.

networks:
  opd-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN to your hospital domain (e.g. opd.hospital.in)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gateway
    networks:
      - opd-net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opd_preconsult}
      POSTGRES_USER: ${POSTGRES_USER:-opd_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/init.sh:/docker-entrypoint-initdb.d/99-init.sh
    networks:
      - opd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opd_user} -d ${POSTGRES_DB:-opd_preconsult}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - opd-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set a strong MINIO_SECRET_KEY}
      # Encryption at rest (B1): REQUIRED in prod. Format `key-name:base64-32-bytes`
      # (scripts/gen-secrets.js prints a valid value). BACK THIS KEY UP — losing it
      # makes encrypted objects unreadable. python-backend enables bucket SSE-S3.
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:?set MINIO_KMS_SECRET_KEY for encryption at rest (see scripts/gen-secrets.js)}
    volumes:
      - minio-data:/data
    networks:
      - opd-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      node-backend:
        condition: service_healthy
      python-backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - opd-net

  node-backend:
    build: ./services/node-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4001
      NODE_ENV: production
      MIGRATIONS_DIR: /migrations
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opd-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-backend:
    build: ./services/python-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4002
      # §7a — lets the python backend apply its production fail-closed config
      # guard (default DB/MinIO creds) and lock CORS to the configured origin.
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opd-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ""
    networks:
      - opd-net
