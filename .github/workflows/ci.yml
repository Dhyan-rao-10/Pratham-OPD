name: CI

# Runs on every push/PR to main. Purpose: stop a broken build reaching the
# hospital deploy — catches failing unit tests, JS syntax errors, and invalid
# nginx configs (the class of bug that let the prod proxy ship with no rate
# limiting and missing routes). Fast + dependency-light so it stays green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/node-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Syntax-check every source file
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Unit tests (authz + PIN hashing)
        run: npm test

  python-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Unit tests (drug interactions / data / LLM JSON)
        run: python -m pytest tests -q

  nginx-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nginx
        run: sudo apt-get update && sudo apt-get install -y nginx
      - name: Validate gateway + production nginx configs
        run: |
          set -e
          for f in services/gateway/nginx.conf deploy/nginx.conf; do
            echo "== nginx -t: $f =="
            { echo 'events{}'; echo 'http{'; cat "$f"; echo '}'; } > /tmp/wrapped.conf
            sudo nginx -t -c /tmp/wrapped.conf
          done

  # End-to-end: spin up the whole stack in DEV mode and drive the real routes.
  # Unit tests prove functions; this proves the pieces still work TOGETHER (the
  # near-lockout class of bug that a fresh-DB unit test can't see). The doctor
  # leg self-skips where no demo doctor is seeded (e.g. the production repo), so
  # this stays green there while still exercising the full patient path + authz.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write a CI .env (throwaway dev secrets — never used in prod)
        run: |
          cat > .env <<'EOF'
          JWT_SECRET=ci_only_jwt_secret_not_for_production_0123456789
          ADMIN_PASSCODE=ci_admin_passcode
          QR_SIGNING_SECRET=ci_only_qr_secret_not_for_production_0123456789
          POSTGRES_PASSWORD=changeme_in_production
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=changeme_in_production
          EOF
      - name: Build & start the stack (waits for backend healthchecks)
        run: docker compose up -d --build --wait
      - name: Wait for the gateway to route
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost/healthz >/dev/null 2>&1; then echo "gateway up after $i checks"; exit 0; fi
            sleep 3
          done
          echo "gateway did not become ready"; docker compose logs --tail=120; exit 1
      - name: Full-journey smoke test (patient -> doctor -> prescribe)
        run: node scripts/smoke.js http://localhost
      - name: Authorization integration test (IDOR + role gating)
        run: node scripts/smoke-authz.js http://localhost
      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose down -v
