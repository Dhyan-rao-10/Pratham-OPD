# Rate-limit zones (A13, defense-in-depth — the app also caps OTP per phone).
# Keyed by the real client IP (see real_ip config in the server block below).
limit_req_zone $binary_remote_addr zone=otp:10m rate=12r/m;      # ~1 OTP req / 5s / IP
limit_req_zone $binary_remote_addr zone=uploads:10m rate=30r/m;  # OCR / audio / scribe uploads

server {
    listen 80;
    client_max_body_size 20M;

    # ── Real client IP (A13) ──────────────────────────────────────────────
    # In prod the gateway sits behind Caddy (TLS terminator); trust only internal
    # proxies (Docker bridge + loopback) so rate-limit keys are the real client IP,
    # not Caddy's. In dev (direct to :80) this is a harmless no-op.
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Security headers (A13, applied to all responses) ──────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS is added by Caddy over HTTPS in production. CSP is left to a later
    # hardening pass (needs per-page testing to avoid breaking the app).

    # Re-resolve Docker service names to IPs at request time (every ~10s) using
    # Docker's embedded DNS (127.0.0.11). Combined with proxy_pass via variables
    # below, this means rebuilding a backend container (which gives it a new IP)
    # never leaves nginx pointing at a dead address — no more 502 Bad Gateway
    # after `docker compose up -d --build`.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $node_backend   http://node-backend:4001;
    set $python_backend http://python-backend:4002;
    set $frontend       http://frontend:3000;

    # Liveness endpoint for an external uptime monitor (A12). Cheap edge check —
    # for a deeper check, monitor also hits GET /api/queue/board?department=CARD
    # (public, exercises node + Postgres).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Node backend routes ──────────────────────────────────────────────
    location /api/session {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/otp {
        limit_req zone=otp burst=5 nodelay;
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/q {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/vitals {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/settings {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/admin {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/doctor {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/protocol {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/alerts {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /api/whatsapp {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/prescription/check-interactions {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/prescription/check-bulk {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/prescription {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/followup {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analytics {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tickets {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Only the external HIS/FHIR webhook receiver goes to the backend. The bare
    # /his and /his/ paths are the frontend admin dashboard — keep them on the
    # frontend so a trailing slash doesn't hit the backend ("Cannot GET /his/").
    location /his/fhir {
        proxy_pass $node_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Python backend routes ────────────────────────────────────────────
    location /api/llm {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/triage {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/report {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/ocr {
        limit_req zone=uploads burst=10 nodelay;
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/drugs {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/scribe {
        limit_req zone=uploads burst=10 nodelay;
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    location /api/audio {
        limit_req zone=uploads burst=10 nodelay;
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    location /api/transcribe {
        limit_req zone=uploads burst=10 nodelay;
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        client_max_body_size 25M;
    }

    location /api/tts {
        proxy_pass $python_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Frontend ─────────────────────────────────────────────────────────
    location / {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
